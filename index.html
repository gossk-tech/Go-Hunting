<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Random Animal Selector</title>\n    <style>\n        body {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f5f5f5;\n            font-family: Arial, sans-serif;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 16px;\n            cursor: pointer;\n            background-color: #4CAF50;\n            color: white;\n            border: none;\n            border-radius: 5px;\n            margin-top: 20px;\n        }\n        img {\n            margin-top: 20px;\n            max-width: 100%;\n            height: auto;\n        }\n    </style>\n</head>\n<body>\n    <h1>Random Animal Selector</h1>\n    <button id="selectAnimal">Select Random Animal</button>\n    <img id="animalImage" src="" alt="Random Animal" style="display: none;">\n    <script>\n        const animals = [\n            { name: 'Lion', image: 'https://example.com/lion.jpg' },\n            { name: 'Tiger', image: 'https://example.com/tiger.jpg' },\n            { name: 'Bear', image: 'https://example.com/bear.jpg' },\n            { name: 'Wolf', image: 'https://example.com/wolf.jpg' },\n            { name: 'Fox', image: 'https://example.com/fox.jpg' },\n            { name: 'Elephant', image: 'https://example.com/elephant.jpg' },\n            { name: 'Giraffe', image: 'https://example.com/giraffe.jpg' },\n            { name: 'Zebra', image: 'https://example.com/zebra.jpg' },\n            { name: 'Kangaroo', image: 'https://example.com/kangaroo.jpg' },\n            { name: 'Panda', image: 'https://example.com/panda.jpg' },\n            { name: 'Rabbit', image: 'https://example.com/rabbit.jpg' },\n            { name: 'Deer', image: 'https://example.com/deer.jpg' },\n            { name: 'Cheetah', image: 'https://example.com/cheetah.jpg' },\n            { name: 'Monkey', image: 'https://example.com/monkey.jpg' }\n        ];\n        document.getElementById('selectAnimal').addEventListener('click', () => {\n            const randomIndex = Math.floor(Math.random() * animals.length);\n            const selectedAnimal = animals[randomIndex];\n            const img = document.getElementById('animalImage');\n            img.src = selectedAnimal.image;\n            img.alt = selectedAnimal.name;\n            img.style.display = 'block';\n        });\n    </script>\n</body>\n</html>\n
