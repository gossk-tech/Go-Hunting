<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Hunting</title>
    <script>
        function showRandomImage() {
            const images = ["Hunting.png", "Hunting 1.png", "Hunting 2.png", "Hunting 3.png", "Hunting 4.png", "Hunting 5.png", "Hunting 6.png", "Hunting 7.png", "Hunting 8.png", "Hunting 9.png", "Hunting 10.png", "Hunting 11.png", "Hunting 12.png", "Hunting 13.png"];
            const randomIndex = Math.floor(Math.random() * images.length);
            const imageElement = document.getElementById('hunting-image');
            imageElement.src = images[randomIndex];
        }
    </script>
</head>
<body>
    <h1>Welcome to Go Hunting!</h1>
    <button onclick="showRandomImage()">Go hunting!</button>
    <br>
    <img id="hunting-image" src="" alt="Hunting Image" style="margin-top: 20px; width: 300px; height: auto;">
</body>
</html>
